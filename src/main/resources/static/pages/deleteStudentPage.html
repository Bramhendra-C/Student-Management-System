<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Delete Student
    </title>

    <!-- Google Font -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;

        }

        body {

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 40px;

            background: linear-gradient(
                135deg,
                #dc2626,
                #b91c1c,
                #7f1d1d
            );

        }

        .container {

            width: 100%;
            max-width: 700px;

            background: rgba(255,255,255,.15);

            backdrop-filter: blur(18px);

            border-radius: 25px;

            padding: 40px;

            border: 1px solid rgba(255,255,255,.2);

            box-shadow: 0 20px 50px rgba(0,0,0,.30);

        }

        .header {

            text-align: center;

            margin-bottom: 35px;

        }

        .header i {

            font-size: 60px;

            color: #ffd5d5;

            margin-bottom: 15px;

        }

        .header h1 {

            color: white;

            font-size: 34px;

            margin-bottom: 10px;

        }

        .header p {

            color: rgba(255,255,255,.92);

        }

        .warning {

            background: rgba(255,255,255,.15);

            border-left: 5px solid #facc15;

            padding: 18px;

            border-radius: 12px;

            color: white;

            margin-bottom: 30px;

            line-height: 1.6;

        }

        .input-group {

            display: flex;

            flex-direction: column;

        }

        .input-group label {

            color: white;

            margin-bottom: 10px;

            font-weight: 500;

        }

        .input-group input {

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 12px;

            font-size: 15px;

            outline: none;

            transition: .3s;

        }

        .input-group input:focus {

            transform: scale(1.02);

            box-shadow: 0 0 0 4px rgba(255,255,255,.25);

        }

        .button-area {

            display: flex;

            justify-content: center;

            margin-top: 35px;

        }

        .delete-btn {

            border: none;

            cursor: pointer;

            padding: 15px 40px;

            border-radius: 50px;

            font-size: 16px;

            font-weight: 600;

            color: white;

            background: linear-gradient(
                135deg,
                #ef4444,
                #b91c1c
            );

            transition: .3s;

        }

        .delete-btn:hover {

            transform: translateY(-4px);

            box-shadow: 0 12px 30px rgba(0,0,0,.30);

        }

        .dashboard-btn {

            display: inline-block;

            margin-top: 25px;

            text-decoration: none;

            color: white;

            background: rgba(255,255,255,.15);

            padding: 12px 22px;

            border-radius: 10px;

            transition: .3s;

        }

        .dashboard-btn:hover {

            background: rgba(255,255,255,.25);

        }

        .loading {

            display: none;

            text-align: center;

            color: white;

            margin-top: 25px;

        }

        .loading i {

            font-size: 28px;

            animation: spin 1s linear infinite;

        }

        @keyframes spin {

            from {

                transform: rotate(0deg);

            }

            to {

                transform: rotate(360deg);

            }

        }

        .message {

            display: none;

            margin-top: 25px;

            padding: 18px;

            border-radius: 12px;

            text-align: center;

            color: white;

            font-weight: 600;

        }

        .success {

            background: rgba(16,185,129,.25);

            border: 1px solid #10b981;

        }

        .error {

            background: rgba(239,68,68,.25);

            border: 1px solid #ef4444;

        }

        @media (max-width:768px) {

            body {

                padding: 20px;

            }

            .container {

                padding: 25px;

            }

            .header h1 {

                font-size: 28px;

            }

        }

    </style>

</head>

<body>

    <div class="container">

        <!-- ============================= -->
        <!-- Header -->
        <!-- ============================= -->

        <div class="header">

            <i class="fa-solid fa-user-xmark"></i>

            <h1>
                Delete Student
            </h1>

            <p>
                Permanently remove a student record from the database.
            </p>

        </div>

        <!-- ============================= -->
        <!-- Warning Card -->
        <!-- ============================= -->

        <div class="warning">

            <strong>
                <i class="fa-solid fa-triangle-exclamation"></i>
                Warning
            </strong>

            <br><br>

            This action is permanent and cannot be undone.
            Please verify the Student ID before deleting the record.

        </div>

        <!-- ============================= -->
        <!-- Delete Form -->
        <!-- ============================= -->

        <form id="deleteForm">

            <div class="input-group">

                <label for="studentId">

                    <i class="fa-solid fa-id-card"></i>

                    Student ID

                </label>

                <input
                    type="number"
                    id="studentId"
                    placeholder="Enter Student ID"
                    required>

            </div>

            <!-- ============================= -->
            <!-- Delete Button -->
            <!-- ============================= -->

            <div class="button-area">

                <button
                    type="submit"
                    class="delete-btn">

    <i class="fa-solid fa-trash"></i>

    Delete Student

</button>

</div>

</form>

<!-- ============================= -->
<!-- Loading -->
<!-- ============================= -->

<div
    id="loading"
    class="loading">

    <i class="fa-solid fa-spinner"></i>

    <p>
        Deleting student...
    </p>

</div>

<!-- ============================= -->
<!-- Response Message -->
<!-- ============================= -->

<div
    id="responseMessage"
    class="message">

</div>

<!-- ============================= -->
<!-- Dashboard Button -->
<!-- ============================= -->

<div
    style="text-align: center; margin-top: 25px;">

    <a
        href="../index.html"
        class="dashboard-btn">

        <i class="fa-solid fa-house"></i>

        Back to Dashboard

    </a>

</div>

</div>

<script>

    const form = document.getElementById("deleteForm");

    const loading = document.getElementById("loading");

    const responseMessage = document.getElementById("responseMessage");

    form.addEventListener("submit", async function (event) {

        event.preventDefault();

        const studentId = document
            .getElementById("studentId")
            .value
            .trim();

        if (studentId === "") {

            showMessage(
                "Please enter a Student ID.",
                false
            );

            return;

        }

        const confirmDelete = confirm(
            "Are you sure you want to delete this student?"
        );

        if (!confirmDelete) {

            return;

        }

        loading.style.display = "block";

        responseMessage.style.display = "none";

        try {

            const response = await fetch(

                `http://localhost:8080/students/${studentId}`,

                {
                    method: "DELETE"
                }

            );

            loading.style.display = "none";

            if (response.ok) {

                showMessage(
                    "✅ Student deleted successfully!",
                    true
                );

                form.reset();

            }
            else {

                showMessage(
                    "❌ Failed to delete student. Please check the Student ID.",
                    false
                );

            }

        }
        catch (error) {

            loading.style.display = "none";

            console.error(error);

            showMessage(
                "Unable to connect to the server.",
                false
            );

        }

    });

    function showMessage(message, success) {

        responseMessage.style.display = "block";

        responseMessage.textContent = message;

        if (success) {

            responseMessage.classList.remove("error");
            responseMessage.classList.add("success");

        }
        else {

            responseMessage.classList.remove("success");
            responseMessage.classList.add("error");

        }

    }

</script>

</body>

</html>
