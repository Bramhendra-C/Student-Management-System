<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Multiple Students</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;

            background: linear-gradient(
                -45deg,
                #2563eb,
                #4f46e5,
                #7c3aed,
                #06b6d4
            );

            background-size: 400% 400%;

            animation: gradientAnimation 12s ease infinite;
        }

        @keyframes gradientAnimation {

            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }

        }

        .card {

            width: 550px;
            max-width: 100%;

            background: rgba(255, 255, 255, 0.15);

            backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            border-radius: 25px;

            padding: 45px;

            text-align: center;

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);

            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {

            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }

        }

        .icon {

            font-size: 85px;

            margin-bottom: 20px;
        }

        h1 {

            color: white;

            font-size: 34px;

            margin-bottom: 15px;

            font-weight: 700;
        }

        p {

            color: rgba(255, 255, 255, 0.92);

            font-size: 17px;

            line-height: 1.8;

            margin-bottom: 35px;
        }

        .status {

            display: inline-block;

            background: rgba(255, 255, 255, 0.2);

            color: white;

            padding: 10px 22px;

            border-radius: 30px;

            font-size: 14px;

            font-weight: 600;

            margin-bottom: 30px;
        }

        .button {

            display: inline-block;

            text-decoration: none;

            color: #2563eb;

            background: white;

            padding: 14px 35px;

            border-radius: 50px;

            font-weight: 600;

            transition: 0.3s;
        }

        .button:hover {

            transform: translateY(-5px);

            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
        }

        @media (max-width: 600px) {

            .card {

                padding: 30px;

            }

            h1 {

                font-size: 28px;

            }

            p {

                font-size: 15px;

            }

            .icon {

                font-size: 65px;

            }

        }

    </style>

</head>

<body>

    <div class="card">

        <div class="icon">
            📚
        </div>

        <h1>
            Add Multiple Students
        </h1>

        <div class="status">
            🚀 Feature Under Development
        </div>

        <p>
            This module will allow administrators to add multiple student
            records at once using Excel, CSV, or JSON files.
            <br><br>
            We are currently developing this feature to make bulk student
            registration faster and easier.
        </p>

        <a href="../index.html" class="button">
            ← Back to Dashboard
        </a>

    </div>

</body>

</html>
