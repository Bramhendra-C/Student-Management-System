<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Update Student
    </title>

    <!-- Google Font -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;

            font-family: "Poppins", sans-serif;

        }

        body {

            min-height: 100vh;

            background: linear-gradient(
                135deg,
                #2563eb,
                #4f46e5,
                #7c3aed
            );

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 40px;

        }

        .container {

            width: 100%;

            max-width: 850px;

            background: rgba(255,255,255,.15);

            backdrop-filter: blur(18px);

            border-radius: 25px;

            padding: 40px;

            box-shadow: 0 20px 50px rgba(0,0,0,.30);

            border: 1px solid rgba(255,255,255,.18);

        }

        .header {

            text-align: center;

            margin-bottom: 35px;

        }

        .header h1 {

            color: white;

            font-size: 36px;

            margin-bottom: 10px;

        }

        .header p {

            color: rgba(255,255,255,.9);

        }

        .form-grid {

            display: grid;

            grid-template-columns: repeat(2,1fr);

            gap: 20px;

        }

        .input-group {

            display: flex;

            flex-direction: column;

        }

        .input-group.full {

            grid-column: span 2;

        }

        label {

            color: white;

            margin-bottom: 8px;

            font-weight: 500;

        }

        input {

            width: 100%;

            padding: 14px 16px;

            border: none;

            border-radius: 12px;

            outline: none;

            font-size: 15px;

            transition: .3s;

        }

        input:focus {

            box-shadow: 0 0 0 4px rgba(255,255,255,.25);

            transform: scale(1.02);

        }

        .button-area {

            display: flex;

            justify-content: center;

            margin-top: 35px;

        }

        .update-btn {

            border: none;

            outline: none;

            cursor: pointer;

            padding: 15px 40px;

            font-size: 16px;

            font-weight: 600;

            border-radius: 50px;

            color: white;

            background: linear-gradient(
                135deg,
                #10b981,
                #059669
            );

            transition: .3s;

        }

        .update-btn:hover {

            transform: translateY(-4px);

            box-shadow: 0 12px 30px rgba(0,0,0,.25);

        }

        .dashboard-btn {

            display: inline-block;

            margin-top: 25px;

            color: white;

            text-decoration: none;

            background: rgba(255,255,255,.18);

            padding: 12px 22px;

            border-radius: 10px;

            transition: .3s;

        }

        .dashboard-btn:hover {

            background: rgba(255,255,255,.28);

        }

        .message {

            margin-top: 30px;

            text-align: center;

            font-size: 18px;

            font-weight: 600;

            color: white;

            display: none;

            padding: 18px;

            border-radius: 12px;

        }

        .success {

            background: rgba(16,185,129,.25);

            border: 1px solid #10b981;

        }

        .error {

            background: rgba(239,68,68,.25);

            border: 1px solid #ef4444;

        }

        .loading {

            display: none;

            text-align: center;

            color: white;

            margin-top: 25px;

        }

        .loading i {

            font-size: 28px;

            animation: spin 1s linear infinite;

        }

        @keyframes spin {

            from {

                transform: rotate(0deg);

            }

            to {

                transform: rotate(360deg);

            }

        }

        @media (max-width:768px) {

            .form-grid {

                grid-template-columns: 1fr;

            }

            .input-group.full {

                grid-column: span 1;

            }

            .container {

                padding: 25px;

            }

            .header h1 {

                font-size: 28px;

            }

        }

    </style>

</head>

<body>

    <div class="container">

        <!-- =========================== -->
        <!-- Header -->
        <!-- =========================== -->

        <div class="header">

            <h1>
                <i class="fa-solid fa-user-pen"></i>
                Update Student
            </h1>

            <p>
                Modify an existing student's information and save the changes.
            </p>

        </div>

        <!-- =========================== -->
        <!-- Update Form -->
        <!-- =========================== -->

        <form id="updateForm">

            <div class="form-grid">

                <!-- Student ID -->

                <div class="input-group">

                    <label for="studentId">

                        <i class="fa-solid fa-id-card"></i>

                        Student ID

                    </label>

                    <input
                        type="number"
                        id="studentId"
                        placeholder="Enter Student ID"
                        required>

                </div>

                <!-- Student Name -->

                <div class="input-group">

                    <label for="studentName">

                        <i class="fa-solid fa-user"></i>

                        Student Name

                    </label>

                    <input
                        type="text"
                        id="studentName"
                        placeholder="Enter Student Name"
                        required>

                </div>

                <!-- Student Email -->

                <div class="input-group">

                    <label for="studentEmail">

                        <i class="fa-solid fa-envelope"></i>

                        Student Email

                    </label>

                    <input
                        type="email"
                        id="studentEmail"
                        placeholder="Enter Student Email"
                        required>

                </div>

                <!-- Course -->

                <div class="input-group">

                    <label for="studentCourse">

                        <i class="fa-solid fa-graduation-cap"></i>

                        Course

                    </label>

                    <input
                        type="text"
                        id="studentCourse"
                        placeholder="Enter Course"
                        required>

                </div>

                <!-- Phone Number -->

                <div class="input-group full">

                    <label for="studentPhoneNumber">

                        <i class="fa-solid fa-phone"></i>

                        Phone Number

                    </label>

                    <input
                        type="tel"
                        id="studentPhoneNumber"
                        placeholder="Enter Phone Number"
                        maxlength="10"
                        required>

                </div>

            </div>

            <!-- =========================== -->
            <!-- Update Button -->
            <!-- =========================== -->

            <div class="button-area">

                <button
                    type="submit"
                    class="update-btn">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Update Student

                </button>

            </div>

        </form>

        <!-- =========================== -->
        <!-- Loading -->
        <!-- =========================== -->

        <div
            class="loading"
            id="loading">

            <i class="fa-solid fa-spinner"></i>

            <p>
                Updating student information...
            </p>

        </div>

        <!-- =========================== -->
        <!-- Response Message -->
        <!-- =========================== -->

        <div
            id="responseMessage"
            class="message">

        </div>

        <!-- =========================== -->
        <!-- Dashboard Button -->
        <!-- =========================== -->

        <div
            style="
                text-align:center;
                margin-top:25px;
            ">

            <a
                href="../index.html"
                class="dashboard-btn">

                <i class="fa-solid fa-house"></i>

                Back to Dashboard

            </a>

        </div>

    </div>

    <script>

        const form = document.getElementById("updateForm");

        const loading = document.getElementById("loading");

        const responseMessage = document.getElementById("responseMessage");

        form.addEventListener("submit", function (event) {

            event.preventDefault();

            const studentId =
                document.getElementById("studentId").value.trim();

            const studentName =
                document.getElementById("studentName").value.trim();

            const studentEmail =
                document.getElementById("studentEmail").value.trim();

            const studentCourse =
                document.getElementById("studentCourse").value.trim();

            const studentPhoneNumber =
                document.getElementById("studentPhoneNumber").value.trim();

            // ===============================
            // Validation
            // ===============================

            if (
                studentId === "" ||
                studentName === "" ||
                studentEmail === "" ||
                studentCourse === "" ||
                studentPhoneNumber === ""
            ) {

                showMessage(
                    "Please fill in all fields.",
                    false
                );

                return;

            }

            const emailPattern =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailPattern.test(studentEmail)) {

                showMessage(
                    "Please enter a valid email address.",
                    false
                );

                return;

            }

            const phonePattern =
                /^[0-9]{10}$/;

            if (!phonePattern.test(studentPhoneNumber)) {

                showMessage(
                    "Phone number must contain exactly 10 digits.",
                    false
                );

                return;

            }

            // ===============================
            // Show Loading
            // ===============================

            loading.style.display = "block";

            responseMessage.style.display = "none";

            const data = {

                name: studentName,

                email: studentEmail,

                course: studentCourse,

                phoneNumber: studentPhoneNumber

            };

            // ===============================
            // API Request
            // ===============================

            fetch(`http://localhost:8080/students/${studentId}`, {

                method: "PUT",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify(data)

            })

            .then(response => {

                loading.style.display = "none";

                if (!response.ok) {

                    throw new Error(
                        "Student update failed."
                    );

                }

                return response.json();

            })

            .then(result => {

                showMessage(
                    "✅ Student updated successfully!",
                    true
                );

                form.reset();

            })

            .catch(error => {

                loading.style.display = "none";

                showMessage(
                    error.message,
                    false
                );

                console.error(error);

            });

        });

        // =====================================
        // Display Success / Error Message
        // =====================================

        function showMessage(message, success) {

            responseMessage.style.display = "block";

            responseMessage.textContent = message;

            if (success) {

                responseMessage.classList.remove("error");

                responseMessage.classList.add("success");

            }
            else {

                responseMessage.classList.remove("success");

                responseMessage.classList.add("error");

            }

        }

    </script>

</body>
</html>
